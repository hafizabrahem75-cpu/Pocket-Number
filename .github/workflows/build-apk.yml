name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "artifacts/pocket-number/**"
      - "lib/**"
      - "pnpm-lock.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        working-directory: artifacts/pocket-number
        env:
          BASE_PATH: /
          PORT: "3000"
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: pnpm run build

      - name: Sync Capacitor
        working-directory: artifacts/pocket-number
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x artifacts/pocket-number/android/gradlew

      - name: Build debug APK
        working-directory: artifacts/pocket-number/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-number-debug
          path: artifacts/pocket-number/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
