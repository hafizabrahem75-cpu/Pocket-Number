openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pocket Number API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User search
  - name: friends
    description: Friend requests and contacts
  - name: contacts
    description: Personal contacts book
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: Creates a new account and sends an OTP to the email for verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful, OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  devOtp:
                    type: string
                    description: OTP code for testing — present only in development mode, never in production
                required:
                  - message
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  devOtp:
                    type: string
                    description: OTP code for testing — present only in development mode, never in production
                required:
                  - message
        "400":
          description: Email not found or already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and mark user offline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/heartbeat:
    post:
      operationId: heartbeat
      tags: [users]
      summary: Keep-alive heartbeat — marks the caller as online
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search user by Pocket Number
      description: Find a user by their exact Pocket Number (e.g. PN-100001)
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Pocket Number to search for (e.g. PN-100001)
          schema:
            type: string
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get friends list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of accepted friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendEntry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/incoming:
    get:
      operationId: getIncomingFriendRequests
      tags: [friends]
      summary: Get incoming pending friend requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/outgoing:
    get:
      operationId: getOutgoingFriendRequests
      tags: [friends]
      summary: Get outgoing pending friend requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of outgoing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/request:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFriendRequestInput"
      responses:
        "201":
          description: Friend request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestItem"
        "400":
          description: Invalid request (self-request, already friends, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}/reject:
    post:
      operationId: rejectFriendRequest
      tags: [friends]
      summary: Reject a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}:
    delete:
      operationId: cancelFriendRequest
      tags: [friends]
      summary: Cancel an outgoing friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: Get my contacts list
      description: Returns the caller's personal contacts book with local names
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addContact
      tags: [contacts]
      summary: Add a contact by Pocket Number
      description: Adds a user to the caller's personal contacts book with an optional local name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddContactInput"
      responses:
        "201":
          description: Contact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactItem"
        "400":
          description: Invalid input or cannot add self
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pocket Number not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already in contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/{id}:
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update the local name of a contact
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactInput"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactItem"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Remove a contact
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        pocketNumber:
          type: string
          description: "9-digit unique number with prefix 71/73/77/700 (e.g. 713456789)"
        name:
          type: string
        email:
          type: string
        isVerified:
          type: boolean
        isOnline:
          type: boolean
          description: Whether the user is currently online
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the user's last activity
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - pocketNumber
        - name
        - email
        - isVerified
        - isOnline
        - lastSeenAt
        - createdAt

    PublicUser:
      type: object
      description: Public-facing user info (no email)
      properties:
        id:
          type: integer
        pocketNumber:
          type: string
        name:
          type: string
        isVerified:
          type: boolean
        isOnline:
          type: boolean
          description: Whether the user is currently online
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the user's last activity
        friendshipStatus:
          type: string
          enum: [none, pending_sent, pending_received, accepted]
          description: Relationship of the current user to this user
        friendshipId:
          type: integer
          description: ID of the friendship record if one exists
      required:
        - id
        - pocketNumber
        - name
        - isVerified
        - isOnline
        - lastSeenAt
        - friendshipStatus

    FriendEntry:
      type: object
      description: A friend in the friends list
      properties:
        friendshipId:
          type: integer
        user:
          $ref: "#/components/schemas/PublicUser"
        since:
          type: string
          format: date-time
      required:
        - friendshipId
        - user
        - since

    FriendRequestItem:
      type: object
      description: A friend request (incoming or outgoing)
      properties:
        id:
          type: integer
        requester:
          $ref: "#/components/schemas/PublicUser"
        addressee:
          $ref: "#/components/schemas/PublicUser"
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - requester
        - addressee
        - status
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 100
      required:
        - name
        - email
        - password

    VerifyOtpInput:
      type: object
      properties:
        email:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
        - email
        - code

    ResendOtpInput:
      type: object
      properties:
        email:
          type: string
      required:
        - email

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 1
      required:
        - email
        - password

    SendFriendRequestInput:
      type: object
      properties:
        addresseeId:
          type: integer
      required:
        - addresseeId

    ContactItem:
      type: object
      description: A single entry in the caller's personal contacts book
      properties:
        id:
          type: integer
        localName:
          type: string
          description: Custom name chosen by the owner — private, never visible to others
        pocketNumber:
          type: string
          description: The contact's Pocket Number (e.g. PN-100001)
        isVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - localName
        - pocketNumber
        - isVerified
        - createdAt

    AddContactInput:
      type: object
      properties:
        pocketNumber:
          type: string
          description: Pocket Number of the user to add (e.g. PN-100001)
        localName:
          type: string
          minLength: 1
          maxLength: 50
          description: Optional custom name. Defaults to the contact's real name if omitted.
      required:
        - pocketNumber

    UpdateContactInput:
      type: object
      properties:
        localName:
          type: string
          minLength: 1
          maxLength: 50
      required:
        - localName
