openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Pocket Number API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User search
  - name: friends
    description: Friend requests and contacts
  - name: contacts
    description: Personal contacts book
  - name: messages
    description: Direct messaging between users
  - name: calls
    description: Voice call foundation (metadata/history only — no audio/WebRTC yet)
paths:
  # ---------------------------------------------------------------------------
  # Messages
  # ---------------------------------------------------------------------------

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a direct message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/inbox:
    get:
      operationId: getInbox
      tags: [messages]
      summary: List all conversations (latest message per peer)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inbox conversation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConversationListItem"
                required:
                  - conversations
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/conversation:
    get:
      operationId: getMessageThread
      tags: [messages]
      summary: Get paginated message thread with a specific user
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: recipientId
          required: true
          schema:
            type: integer
          description: User ID of the other party
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Cursor — return messages older than this message ID
      responses:
        "200":
          description: Paginated message thread (oldest-first within the page)
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/MessageItem"
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: integer
                    nullable: true
                required:
                  - messages
                  - hasMore
                  - nextCursor
        "400":
          description: Invalid recipientId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/{id}/status:
    patch:
      operationId: updateMessageStatus
      tags: [messages]
      summary: Advance message status (delivered → read). Recipient only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Message ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageStatusInput"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot revert to an earlier status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Soft-delete a sent message (sender only, only if not yet read)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Message ID
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot delete a message that has already been read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Calls
  # ---------------------------------------------------------------------------

  /calls:
    post:
      operationId: startCall
      tags: [calls]
      summary: Start a voice call
      description: Creates a call record in "ringing" status. No audio/WebRTC signaling yet — metadata only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartCallInput"
      responses:
        "201":
          description: Call started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Receiver not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calls/history:
    get:
      operationId: getCallHistory
      tags: [calls]
      summary: Get paginated call history (as caller or receiver)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Cursor — return calls older than this call ID
      responses:
        "200":
          description: Paginated call history, newest-first
          content:
            application/json:
              schema:
                type: object
                properties:
                  calls:
                    type: array
                    items:
                      $ref: "#/components/schemas/CallItem"
                  hasMore:
                    type: boolean
                  nextCursor:
                    type: integer
                    nullable: true
                required:
                  - calls
                  - hasMore
                  - nextCursor
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /calls/{id}/status:
    patch:
      operationId: updateCallStatus
      tags: [calls]
      summary: Advance call status (ringing → ongoing/missed/declined; ongoing → ended)
      description: Only the caller or receiver of the call may update it.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Call ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCallStatusInput"
      responses:
        "200":
          description: Updated call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Call not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      description: Creates a new account and sends an OTP to the email for verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful, OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  devOtp:
                    type: string
                    description: OTP code for testing — present only in development mode, never in production
                required:
                  - message
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpInput"
      responses:
        "200":
          description: OTP verified successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-otp:
    post:
      operationId: resendOtp
      tags: [auth]
      summary: Resend OTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  devOtp:
                    type: string
                    description: OTP code for testing — present only in development mode, never in production
                required:
                  - message
        "400":
          description: Email not found or already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and mark user offline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/heartbeat:
    post:
      operationId: heartbeat
      tags: [users]
      summary: Keep-alive heartbeat — marks the caller as online
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search user by Pocket Number
      description: Find a user by their exact Pocket Number (e.g. PN-100001)
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Pocket Number to search for (e.g. PN-100001)
          schema:
            type: string
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends:
    get:
      operationId: getFriends
      tags: [friends]
      summary: Get friends list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of accepted friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendEntry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/incoming:
    get:
      operationId: getIncomingFriendRequests
      tags: [friends]
      summary: Get incoming pending friend requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of incoming requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/outgoing:
    get:
      operationId: getOutgoingFriendRequests
      tags: [friends]
      summary: Get outgoing pending friend requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of outgoing requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FriendRequestItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/request:
    post:
      operationId: sendFriendRequest
      tags: [friends]
      summary: Send a friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendFriendRequestInput"
      responses:
        "201":
          description: Friend request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendRequestItem"
        "400":
          description: Invalid request (self-request, already friends, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}/accept:
    post:
      operationId: acceptFriendRequest
      tags: [friends]
      summary: Accept a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}/reject:
    post:
      operationId: rejectFriendRequest
      tags: [friends]
      summary: Reject a friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /friends/requests/{id}:
    delete:
      operationId: cancelFriendRequest
      tags: [friends]
      summary: Cancel an outgoing friend request
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Friend request cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts:
    get:
      operationId: getContacts
      tags: [contacts]
      summary: Get my contacts list
      description: Returns the caller's personal contacts book with local names
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addContact
      tags: [contacts]
      summary: Add a contact by phone number
      description: >-
        Adds any phone number to the caller's personal contacts book with an
        optional local name, like a phone's contacts app. Automatically links
        to a Pocket Number account when the number is registered; otherwise
        stored as a local-only contact that can be linked automatically later.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddContactInput"
      responses:
        "201":
          description: Contact added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactItem"
        "400":
          description: Invalid input or cannot add self
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Pocket Number not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already in contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/{id}:
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update the local name of a contact
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactInput"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactItem"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Remove a contact
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        pocketNumber:
          type: string
          description: "9-digit unique number with prefix 71/73/77/700 (e.g. 713456789)"
        name:
          type: string
        email:
          type: string
        isVerified:
          type: boolean
        isOnline:
          type: boolean
          description: Whether the user is currently online
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the user's last activity
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - pocketNumber
        - name
        - email
        - isVerified
        - isOnline
        - lastSeenAt
        - createdAt

    PublicUser:
      type: object
      description: Public-facing user info (no email)
      properties:
        id:
          type: integer
        pocketNumber:
          type: string
        name:
          type: string
        isVerified:
          type: boolean
        isOnline:
          type: boolean
          description: Whether the user is currently online
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the user's last activity
        friendshipStatus:
          type: string
          enum: [none, pending_sent, pending_received, accepted]
          description: Relationship of the current user to this user
        friendshipId:
          type: integer
          description: ID of the friendship record if one exists
      required:
        - id
        - pocketNumber
        - name
        - isVerified
        - isOnline
        - lastSeenAt
        - friendshipStatus

    FriendEntry:
      type: object
      description: A friend in the friends list
      properties:
        friendshipId:
          type: integer
        user:
          $ref: "#/components/schemas/PublicUser"
        since:
          type: string
          format: date-time
      required:
        - friendshipId
        - user
        - since

    FriendRequestItem:
      type: object
      description: A friend request (incoming or outgoing)
      properties:
        id:
          type: integer
        requester:
          $ref: "#/components/schemas/PublicUser"
        addressee:
          $ref: "#/components/schemas/PublicUser"
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - requester
        - addressee
        - status
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterInput:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
        password:
          type: string
          minLength: 8
          maxLength: 100
      required:
        - name
        - email
        - password

    VerifyOtpInput:
      type: object
      properties:
        email:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 6
      required:
        - email
        - code

    ResendOtpInput:
      type: object
      properties:
        email:
          type: string
      required:
        - email

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 1
      required:
        - email
        - password

    SendFriendRequestInput:
      type: object
      properties:
        addresseeId:
          type: integer
      required:
        - addresseeId

    ContactItem:
      type: object
      description: A single entry in the caller's personal contacts book
      properties:
        id:
          type: integer
        localName:
          type: string
          description: Custom name chosen by the owner — private, never visible to others
        pocketNumber:
          type: string
          description: >-
            The contact's phone number in canonical form (e.g. "+967 76XXXXXXX").
            Shown whether or not the number belongs to a registered Pocket
            Number user.
        isVerified:
          type: boolean
          description: True only when this number is linked to a registered, verified Pocket Number account.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - localName
        - pocketNumber
        - isVerified
        - createdAt

    AddContactInput:
      type: object
      properties:
        phoneNumber:
          type: string
          description: >-
            Any phone number, registered or not. Accepts "+96776XXXXXXX",
            "96776XXXXXXX", or "76XXXXXXX" — spaces and dashes are ignored.
            If the number belongs to a registered Pocket Number user, the
            contact is linked to that account automatically.
        localName:
          type: string
          minLength: 1
          maxLength: 50
          description: Optional custom name. Defaults to the contact's real name if omitted (or to the phone number itself when unregistered).
      required:
        - phoneNumber

    UpdateContactInput:
      type: object
      properties:
        localName:
          type: string
          minLength: 1
          maxLength: 50
      required:
        - localName

    # -------------------------------------------------------------------------
    # Calls
    # -------------------------------------------------------------------------

    CallItem:
      type: object
      description: A single voice call record (metadata only — no audio/WebRTC yet)
      properties:
        id:
          type: integer
        callerId:
          type: integer
        receiverId:
          type: integer
        status:
          type: string
          enum: [ringing, ongoing, ended, missed, declined]
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - callerId
        - receiverId
        - status
        - startTime
        - endTime

    StartCallInput:
      type: object
      properties:
        receiverId:
          type: integer
      required:
        - receiverId

    UpdateCallStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [ongoing, ended, missed, declined]
      required:
        - status

    # -------------------------------------------------------------------------
    # Messages
    # -------------------------------------------------------------------------

    MessageItem:
      type: object
      description: A single direct message
      properties:
        id:
          type: integer
        senderId:
          type: integer
        recipientId:
          type: integer
        content:
          type: string
          description: >
            Phase 1: plaintext body.
            Phase 2 (E2EE): base64url-encoded ciphertext — paired with
            contentIv and contentTag for AES-GCM decryption on the recipient device.
        contentType:
          type: string
          description: MIME-like type hint (e.g. text/plain). Reserved for future binary types.
        contentIv:
          type: string
          nullable: true
          description: "E2EE: AES-GCM IV (base64url). Null in Phase 1."
        contentTag:
          type: string
          nullable: true
          description: "E2EE: AES-GCM authentication tag (base64url). Null in Phase 1."
        senderPublicKey:
          type: string
          nullable: true
          description: "E2EE: sender ephemeral public key (base64url, X25519). Null in Phase 1."
        status:
          type: string
          enum: [sent, delivered, read]
          description: >
            Delivery state machine: sent → delivered → read.
            Only the recipient may advance the state forward.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - senderId
        - recipientId
        - content
        - contentType
        - contentIv
        - contentTag
        - senderPublicKey
        - status
        - createdAt
        - updatedAt
        - deletedAt

    SendMessageInput:
      type: object
      properties:
        recipientId:
          type: integer
          description: User ID of the recipient
        content:
          type: string
          minLength: 1
          maxLength: 10000
          description: >
            Phase 1: plaintext.
            Phase 2 (E2EE): base64url-encoded ciphertext.
        contentType:
          type: string
          description: Defaults to text/plain. Reserved for future binary types.
        contentIv:
          type: string
          nullable: true
          description: "E2EE: AES-GCM IV (base64url). Omit in Phase 1."
        contentTag:
          type: string
          nullable: true
          description: "E2EE: AES-GCM authentication tag (base64url). Omit in Phase 1."
        senderPublicKey:
          type: string
          nullable: true
          description: "E2EE: sender ephemeral public key for key exchange. Omit in Phase 1."
      required:
        - recipientId
        - content

    UpdateMessageStatusInput:
      type: object
      properties:
        status:
          type: string
          enum: [delivered, read]
          description: >
            New status. Only forward transitions are accepted
            (sent → delivered → read). Only the recipient may call this endpoint.
      required:
        - status

    ConversationListItem:
      type: object
      description: Inbox summary entry — one per conversation partner
      properties:
        peerId:
          type: integer
        peerPocketNumber:
          type: string
        peerName:
          type: string
        peerIsVerified:
          type: boolean
        unreadCount:
          type: integer
        lastMessage:
          type: object
          properties:
            id:
              type: integer
            senderId:
              type: integer
            recipientId:
              type: integer
            content:
              type: string
            contentType:
              type: string
            status:
              type: string
              enum: [sent, delivered, read]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
          required:
            - id
            - senderId
            - recipientId
            - content
            - contentType
            - status
            - createdAt
            - updatedAt
      required:
        - peerId
        - peerPocketNumber
        - peerName
        - peerIsVerified
        - unreadCount
        - lastMessage
